<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .folder { fill: #FFA500; stroke: #333; stroke-width: 1.5; }
      .file { fill: #87CEEB; stroke: #333; stroke-width: 1.5; }
      .text-root { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .text-folder { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
      .text-file { font-family: Arial, sans-serif; font-size: 10px; }
      .line { stroke: #999; stroke-width: 1; fill: none; }
      .info-box { font-family: Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="50" y="30" class="text-root">Log Analysis Streamlit AI Toolkit - Project Structure</text>

  <!-- LEFT SIDE: FOLDER TREE -->
  <g id="tree">
    <!-- Root -->
    <rect x="30" y="50" width="20" height="16" class="folder"/>
    <text x="55" y="62" class="text-folder">log-analysis-streamlit-ai-toolkit/</text>

    <!-- Main divider line -->
    <line x1="40" y1="70" x2="40" y2="780" class="line" stroke-width="1.5"/>

    <!-- Row 1: components -->
    <line x1="40" y1="90" x2="70" y2="90" class="line"/>
    <rect x="70" y="82" width="16" height="16" class="folder"/>
    <text x="92" y="94" class="text-folder">components/</text>
    <text x="210" y="94" class="text-file">▸ __init__.py, sidebar.py, log_analysis_tab.py, knowledge_base_tab.py, maintenance_tab.py</text>

    <!-- Row 2: config -->
    <line x1="40" y1="125" x2="70" y2="125" class="line"/>
    <rect x="70" y="117" width="16" height="16" class="folder"/>
    <text x="92" y="129" class="text-folder">config/</text>
    <text x="210" y="129" class="text-file">▸ __init__.py, settings.py</text>

    <!-- Row 3: data -->
    <line x1="40" y1="160" x2="70" y2="160" class="line"/>
    <rect x="70" y="152" width="16" height="16" class="folder"/>
    <text x="92" y="164" class="text-folder">data/</text>
    <text x="210" y="164" class="text-file">▸ sample_kb/, sample_logs/</text>

    <!-- Row 4: docker -->
    <line x1="40" y1="195" x2="70" y2="195" class="line"/>
    <rect x="70" y="187" width="16" height="16" class="folder"/>
    <text x="92" y="199" class="text-folder">docker/</text>
    <text x="210" y="199" class="text-file">▸ ollama-local/, streamlit-app/</text>

    <!-- Row 5: .streamlit -->
    <line x1="40" y1="230" x2="70" y2="230" class="line"/>
    <rect x="70" y="222" width="16" height="16" class="folder"/>
    <text x="92" y="234" class="text-folder">.streamlit/</text>
    <text x="210" y="234" class="text-file">▸ config.toml</text>

    <!-- Row 6: utils -->
    <line x1="40" y1="265" x2="70" y2="265" class="line"/>
    <rect x="70" y="257" width="16" height="16" class="folder"/>
    <text x="92" y="269" class="text-folder">utils/</text>
    <text x="210" y="269" class="text-file">▸ database.py, embeddings.py, llm_engines.py, pdf_generator.py, search.py</text>

    <!-- Row 7: db_kb -->
    <line x1="40" y1="300" x2="70" y2="300" class="line"/>
    <rect x="70" y="292" width="16" height="16" class="folder"/>
    <text x="92" y="304" class="text-folder">db_kb/</text>
    <text x="210" y="304" class="text-file">▸ chroma.sqlite3</text>

    <!-- Row 8: db_logs -->
    <line x1="40" y1="335" x2="70" y2="335" class="line"/>
    <rect x="70" y="327" width="16" height="16" class="folder"/>
    <text x="92" y="339" class="text-folder">db_logs/</text>
    <text x="210" y="339" class="text-file">▸ chroma.sqlite3</text>

    <!-- Row 9: logs -->
    <line x1="40" y1="370" x2="70" y2="370" class="line"/>
    <rect x="70" y="362" width="16" height="16" class="folder"/>
    <text x="92" y="374" class="text-folder">logs/</text>
    <text x="210" y="374" class="text-file">(runtime logs directory)</text>

    <!-- Root files -->
    <line x1="40" y1="405" x2="70" y2="405" class="line"/>
    <rect x="70" y="397" width="14" height="14" class="file" ry="1"/>
    <text x="92" y="407" class="text-file">app.py</text>

    <line x1="40" y1="435" x2="70" y2="435" class="line"/>
    <rect x="70" y="427" width="14" height="14" class="file" ry="1"/>
    <text x="92" y="437" class="text-file">requirements.txt</text>

    <line x1="40" y1="465" x2="70" y2="465" class="line"/>
    <rect x="70" y="457" width="14" height="14" class="file" ry="1"/>
    <text x="92" y="467" class="text-file">docker-compose.yml</text>

    <line x1="40" y1="495" x2="70" y2="495" class="line"/>
    <rect x="70" y="487" width="14" height="14" class="file" ry="1"/>
    <text x="92" y="497" class="text-file">README.md</text>

    <line x1="40" y1="525" x2="70" y2="525" class="line"/>
    <rect x="70" y="517" width="14" height="14" class="file" ry="1"/>
    <text x="92" y="527" class="text-file">.gitignore, .dockerignore</text>
  </g>

  <!-- RIGHT SIDE: INFO BOXES -->
  <!-- Legend Box -->
  <g id="legend">
    <rect x="30" y="580" width="250" height="100" fill="#F9F9F9" stroke="#333" stroke-width="2" rx="5"/>
    <text x="50" y="600" class="text-root" font-size="12">Legend</text>

    <rect x="50" y="615" width="16" height="14" class="folder"/>
    <text x="75" y="626" class="info-box" font-weight="bold">Directory/Folder</text>

    <rect x="50" y="640" width="14" height="14" class="file" ry="1"/>
    <text x="75" y="651" class="info-box" font-weight="bold">File</text>

    <text x="50" y="670" class="info-box">▸ = contains children</text>
  </g>

  <!-- Summary Box -->
  <g id="summary">
    <rect x="290" y="580" width="450" height="240" fill="#F0F0F0" stroke="#333" stroke-width="2" rx="5"/>
    <text x="310" y="600" class="text-root" font-size="12">Project Architecture</text>

    <text x="310" y="625" class="text-folder">Main Components:</text>
    <text x="330" y="642" class="info-box">• app.py - Streamlit main application with multi-tab UI</text>
    <text x="330" y="658" class="info-box">• components/ - UI tabs (sidebar, log analysis, knowledge base, maintenance)</text>
    <text x="330" y="674" class="info-box">• utils/ - Core modules (database, embeddings, LLM, search, PDF)</text>
    <text x="330" y="690" class="info-box">• docker/ - Container configs (Ollama + Streamlit services)</text>

    <text x="310" y="720" class="text-folder">Data and Configuration:</text>
    <text x="330" y="737" class="info-box">• db_kb/, db_logs/ - Chroma vector databases (SQLite backend)</text>
    <text x="330" y="753" class="info-box">• data/ - Sample knowledge base and log files</text>
    <text x="330" y="769" class="info-box">• config/ - Application settings</text>

    <text x="310" y="795" class="text-folder">Stack:</text>
    <text x="330" y="812" class="info-box">Python • Streamlit • Chroma • Ollama • Docker • SQLite</text>
  </g>

</svg>